name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SKIP_ENV_VALIDATION: 'false'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Load CI env
        run: cp .env.example .env

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint (stylelint)
        run: pnpm exec stylelint "assets/scss/**/*.scss"

      - name: Typecheck
        run: pnpm typecheck

      - name: Prebuild + build
        run: pnpm build

      - name: Verify prerendered locale routes
        run: pnpm verify:prerender
